name: Build Windows .exe

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies (incl. all OCR backends)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Install Tesseract via Chocolatey
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress

      - name: Stage portable Tesseract next to the spec
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\Tesseract-OCR",
            "C:\Program Files (x86)\Tesseract-OCR",
            "${env:LOCALAPPDATA}\Programs\Tesseract-OCR"
          )
          $src = $null
          foreach ($c in $candidates) {
            if (Test-Path (Join-Path $c "tesseract.exe")) { $src = $c; break }
          }
          if (-not $src) {
            Write-Error "Tesseract install not found in expected locations."
            exit 1
          }
          Write-Host "Copying Tesseract from $src"
          Copy-Item -Path $src -Destination "tesseract" -Recurse
          # Trim heavy unused language packs to keep the bundle small.
          $tessdata = "tesseract\tessdata"
          if (Test-Path $tessdata) {
            Get-ChildItem $tessdata -Filter "*.traineddata" |
              Where-Object { $_.BaseName -notin @("eng", "osd") } |
              Remove-Item -Force
          }

      - name: Pre-fetch PaddleOCR and Marker model caches
        shell: pwsh
        continue-on-error: true
        run: |
          python prefetch_models.py

      - name: Build with PyInstaller
        run: pyinstaller pdf_ocr_gui.spec

      - name: Smoke-test the built .exe
        shell: pwsh
        run: |
          $exe = "dist\PDF-OCR-Tool\PDF-OCR-Tool.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build output missing: $exe"
            exit 1
          }
          Write-Host "Built: $exe"
          Get-Item $exe | Format-List Name, Length, LastWriteTime

      - name: Zip portable distribution
        shell: pwsh
        run: |
          $zip = "PDF-OCR-Tool-windows-x64.zip"
          Compress-Archive -Path "dist\PDF-OCR-Tool\*" -DestinationPath $zip -Force
          Get-Item $zip | Format-List Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-OCR-Tool-windows-x64
          path: PDF-OCR-Tool-windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PDF-OCR-Tool-windows-x64.zip
